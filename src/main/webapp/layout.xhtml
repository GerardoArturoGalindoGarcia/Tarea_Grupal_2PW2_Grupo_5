<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core">

  <h:head>
    <title><ui:insert name="title">Título</ui:insert></title>
    <!-- Añadir hojas de estilo o meta adicionales aquí -->
    <ui:insert name="head" />

    <!-- Estilos globales del sistema -->
    <style>
      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        padding: 0;
        background: linear-gradient(135deg, #0052A3 0%, #003B8E 100%);
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        min-height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
      }

      .contenedor {
        width: 500px;
        background: white;
        border-radius: 20px;
        box-shadow: 0 10px 40px rgba(0,0,0,.3);
        overflow: hidden;
        padding: 30px;
      }

      .encabezado-modulo {
        text-align: center;
        color: #003B8E;
        margin-bottom: 20px;
      }

      .encabezado-modulo h2 {
        margin: 0 0 10px 0;
        font-size: 28px;
        font-weight: 700;
      }

      .grid-datos {
        width: 100%;
        margin-bottom: 20px;
      }

      .label-form {
        font-weight: 600;
        color: #333;
        font-size: 14px;
      }

      .input-form {
        width: 100%;
        padding: 10px 12px;
        border-radius: 6px;
        border: 1px solid #d0d0d0;
        box-sizing: border-box;
        font-size: 14px;
        transition: all 0.3s ease;
      }

      .input-form:focus {
        outline: none;
        border-color: #0052A3;
        box-shadow: 0 0 8px rgba(5, 82, 163, 0.15);
        background: #fafbfc;
      }

      .btn-confirmar {
        background-color: #0052A3;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        transition: all 0.3s ease;
        font-size: 14px;
        min-width: 120px;
      }

      .btn-confirmar:hover {
        background-color: #003B8E;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(0, 82, 163, 0.3);
      }

      .btn-salir {
        background-color: #d32f2f;
        color: white;
        padding: 12px 24px;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-weight: bold;
        text-decoration: none;
        text-align: center;
        transition: all 0.3s ease;
        font-size: 14px;
        min-width: 120px;
      }

      .btn-salir:hover {
        background-color: #b71c1c;
        transform: translateY(-2px);
        box-shadow: 0 5px 15px rgba(179, 28, 28, 0.3);
      }

      /* Estilos para h:panelGrid */
      .grid-datos th,
      .grid-datos td {
        padding: 10px;
      }

      /* Responsive design */
      @media (max-width: 600px) {
        .contenedor {
          width: 95%;
          margin: 0 auto;
          padding: 20px;
        }

        .encabezado-modulo h2 {
          font-size: 24px;
        }
      }
    </style>
  </h:head>
  <h:body>
    <header>
      <ui:insert name="header">

      </ui:insert>
    </header>

    <main>
      <ui:insert name="content">

      </ui:insert>
    </main>

    <footer>
      <ui:insert name="footer">

      </ui:insert>
    </footer>
  </h:body>
</html>
