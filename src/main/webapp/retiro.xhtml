<?xml version="1.0" encoding="UTF-8"?>
<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core">

<ui:composition template="/templates/layout.xhtml">
    <ui:define name="content">
        <div class="container-retiro" style="max-width: 500px; margin: 0 auto; padding: 20px;">
            <h:form id="formRetiro">
                <h2>Módulo de Retiros</h2>
                <hr/>

                <h:messages id="mensajes" globalOnly="false" styleClass="mensajes-sistema"
                            errorStyle="color: red; list-style-type: none; font-weight: bold;"
                            infoStyle="color: green; list-style-type: none; font-weight: bold;"/>

                <h:panelGrid columns="2" cellpadding="10" style="width: 100%; margin-bottom: 20px;">

                    <h:outputLabel value="Nombre del Cliente:" style="font-weight: bold;"/>
                    <h:outputText value="#{RetiroBean.cliente.nombreCompleto}" />

                    <h:outputLabel value="Número de Cuenta:" style="font-weight: bold;"/>
                    <h:outputText value="#{RetiroBean.cliente.cuenta}" />

                    <h:outputLabel value="Monto Disponible:" style="font-weight: bold;"/>
                    <h:outputText value="L. #{RetiroBean.cliente.saldoDisponible}" style="color: green; font-weight: bold;" />

                    <h:outputLabel value="Monto a Retirar (L.):" style="font-weight: bold;"/>
                    <h:inputText id="monto" value="#{RetiroBean.montoTransaccion}" required="true"
                                 requiredMessage="Por favor, ingrese un monto a retirar.">
                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                    </h:inputText>

                </h:panelGrid>

                <div class="botones-accion" style="display: flex; gap: 10px;">
                    <h:commandButton value="Confirmar" action="#{RetiroBean.procesarRetiro}"
                                     style="background-color: #004b87; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold;"/>

                    <h:commandButton value="Salir" action="menu?faces-redirect=true" immediate="true"
                                     style="background-color: #d32f2f; color: white; padding: 10px 20px; border: none; cursor: pointer; font-weight: bold;"/>
                </div>
            </h:form>
        </div>
    </ui:define>
</ui:composition>
</html>
