<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:ui="jakarta.faces.facelets"
      xmlns:f="jakarta.faces.core">

<ui:composition template="/layout.xhtml">
    <ui:define name="title">Retiros - Cajero Automático</ui:define>
    <ui:define name="content">
        <div class="contenedor">
            <h:form id="formRetiro">
                <div class="encabezado-modulo">
                    <h2>Módulo de Retiros</h2>
                    <hr style="border: 1px solid #003B8E;"/>
                </div>


                <h:messages id="mensajes" globalOnly="false" styleClass="mensajes-sistema"
                            errorStyle="color: red; list-style-type: none; font-weight: bold; margin-bottom: 15px;"
                            infoStyle="color: green; list-style-type: none; font-weight: bold; margin-bottom: 15px;"/>

                <h:panelGrid columns="2" cellpadding="10" styleClass="grid-datos">

                    <h:outputLabel value="Nombre del Cliente:" style="font-weight: bold;"/>
                    <h:outputText value="#{LoginBean.cliente.nombreCompleto}" style="font-weight: bold; color: #555;" />

                    <h:outputLabel value="Número de Cuenta:" style="font-weight: bold;"/>
                    <h:outputText value="#{LoginBean.cliente.cuenta}" style="color: #555;" />

                    <h:outputLabel value="Monto Disponible:" style="font-weight: bold;"/>
                    <h:outputText value="L. #{LoginBean.cliente.saldoDisponible}" style="color: green; font-weight: bold;"  />

                    <h:outputLabel value="Monto a Retirar (L.):" styleClass="label-form"/>
                    <h:inputText id="monto" value="#{retiroBean.montoTransaccion}" required="true" styleClass="input-form"
                                 autocomplete="off" requiredMessage="Por favor, ingrese un monto a retirar.">
                        <f:passThroughAttribute name="placeholder" value="0.00" />
                        <f:passThroughAttribute name="onfocus" value="if(this.value=='0.00' || this.value=='0') this.value='';" />
                        <f:convertNumber minFractionDigits="2" maxFractionDigits="2"/>
                    </h:inputText>

                    <h:outputLabel value="PIN de Seguridad:" styleClass="label-form"/>
                    <h:inputSecret id="pin" value="#{retiroBean.pinIngresado}" required="true" styleClass="input-form"
                                   requiredMessage="Por favor, ingrese su PIN para confirmar." maxlength="4"/>

                </h:panelGrid>

                <div class="botones-accion" style="display: flex; gap: 15px; justify-content: center; margin-top: 20px;">
                    <h:commandButton value="Confirmar Retiro" action="#{retiroBean.procesarRetiro}" styleClass="btn-confirmar"/>
                    <h:commandButton value="Salir" action="menu?faces-redirect=true" immediate="true" styleClass="btn-salir"/>
                </div>

            </h:form>
        </div>
    </ui:define>
</ui:composition>
</html>
