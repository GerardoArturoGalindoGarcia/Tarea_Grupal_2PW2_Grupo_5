<!DOCTYPE html>
<html xmlns="http://www.w3.org/1999/xhtml"
      xmlns:h="jakarta.faces.html"
      xmlns:f="jakarta.faces.core">

<f:view>

    <h:head>
        <title>Menú - Cajero Automático</title>

        <style>

            body{
                margin:0;
                padding:0;
                background: linear-gradient(135deg, #0052A3 0%, #003B8E 100%);
                font-family:'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
                min-height:100vh;
                display:flex;
                justify-content:center;
                align-items:center;
            }

            .contenedor{
                width:700px;
                background:white;
                border-radius:20px;
                box-shadow:0 10px 40px rgba(0,0,0,.3);
                overflow:hidden;
                animation: slideDown 0.5s ease-out;
                text-align:center;
            }

            @keyframes slideDown {
                from {opacity:0; transform:translateY(-30px);}
                to {opacity:1; transform:translateY(0);}
            }

            .encabezado{
                background: linear-gradient(135deg, #0052A3 0%, #003B8E 100%);
                color:white;
                padding:40px 20px;
            }

            .logo{
                width:280px;
                margin-bottom:10px;
            }

            .titulo{
                font-size:26px;
                font-weight:700;
            }

            .contenido{
                padding:50px;
                display:flex;
                justify-content:space-around;
                gap:20px;
                flex-wrap:wrap;
            }

            .btnMenu{
                width:180px;
                height:150px;
                border:none;
                border-radius:15px;
                cursor:pointer;
                font-size:15px;
                font-weight:700;
                color:#003B8E;
                background:#F5F7FA;
                box-shadow:0 6px 18px rgba(0,0,0,0.15);
                transition:all 0.3s ease;
                display:flex;
                flex-direction:column;
                justify-content:center;
                align-items:center;
                gap:10px;
            }

            .btnMenu:hover{
                transform:translateY(-5px);
                background:white;
                box-shadow:0 10px 25px rgba(0,0,0,0.25);
            }

            .icono{
                font-size:40px;
            }

        </style>

    </h:head>

    <h:body>

        <h:form>

            <div class="contenedor">

                <!-- ENCABEZADO -->
                <div class="encabezado">

                    <h:graphicImage library="imagenes"
                                    name="logo_fico.png"
                                    styleClass="logo"/>

                    <div class="titulo">MENÚ PRINCIPAL</div>

                </div>

                <!-- BOTONES -->
                <div class="contenido">

                    <!-- RETIRO -->
                    <h:commandButton value="RETIRO"
                                     action="retiro?faces-redirect=true"
                                     styleClass="btnMenu"/>

                    <!-- DEPOSITO -->
                    <h:commandButton value="DEPÓSITO"
                                     action="deposito?faces-redirect=true"
                                     styleClass="btnMenu"/>

                    <!-- CONSULTAR SALDO -->
                    <h:commandButton value="CONSULTAR SALDO"
                                     action="saldo?faces-redirect=true"
                                     styleClass="btnMenu"/>

                    <!-- ESTADO CUENTA -->
                    <h:commandButton value="ESTADO CUENTA"
                                     action="estado?faces-redirect=true"
                                     styleClass="btnMenu"/>

                    <!-- CERRAR SESIÓN -->
                    <h:commandButton value="CERRAR SESIÓN"
                                     action="cerrar?faces-redirect=true"
                                     styleClass="btnMenu"/>
                </div>

            </div>

        </h:form>

    </h:body>

</f:view>
</html>
